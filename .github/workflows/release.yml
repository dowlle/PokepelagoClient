name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  verify-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout client
        uses: actions/checkout@v4

      - name: Checkout APWorld repo
        uses: actions/checkout@v4
        with:
          repository: dowlle/ArchipelagoPokepelago
          path: apworld-repo

      - name: Verify versions match tag
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          CLIENT_VERSION=$(node -p "require('./package.json').version")
          APWORLD_VERSION=$(python3 -c "import json; print(json.load(open('apworld-repo/worlds/pokepelago/archipelago.json'))['world_version'])")

          echo "Tag:     $TAG_VERSION"
          echo "Client:  $CLIENT_VERSION"
          echo "APWorld: $APWORLD_VERSION"

          FAILED=0
          if [ "$CLIENT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($CLIENT_VERSION) doesn't match tag ($TAG_VERSION)"
            FAILED=1
          fi
          if [ "$APWORLD_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::archipelago.json world_version ($APWORLD_VERSION) doesn't match tag ($TAG_VERSION)"
            FAILED=1
          fi
          exit $FAILED

  build-apworld:
    runs-on: ubuntu-latest
    needs: [ci, verify-versions]
    steps:
      - name: Checkout APWorld repo
        uses: actions/checkout@v4
        with:
          repository: dowlle/ArchipelagoPokepelago
          path: apworld-repo

      - name: Build .apworld
        id: apworld
        uses: Eijebong/ap-actions/package-apworld@main
        with:
          path: apworld-repo/worlds/pokepelago
          ap-version: '0.6.6'
          python-version: '3.12'

      - name: Generate template YAML
        id: template
        uses: Eijebong/ap-actions/generate-template@main
        with:
          apworld-path: apworld-repo/worlds/pokepelago
          ap-version: '0.6.6'
          python-version: '3.12'

      - uses: actions/upload-artifact@v4
        with:
          name: apworld
          path: ${{ steps.apworld.outputs.apworld }}

      - uses: actions/upload-artifact@v4
        with:
          name: template
          path: ${{ steps.template.outputs.template }}

  publish:
    runs-on: ubuntu-latest
    needs: [build-apworld]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apworld

      - uses: actions/download-artifact@v4
        with:
          name: template

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: '*'
          allowUpdates: true
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
