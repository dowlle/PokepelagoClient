name: Deploy Beta to GitHub Pages

on:
  push:
    branches:
      - beta
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (beta)
        run: npm run build
        env:
          DEPLOY_TARGET: beta

      - name: Deploy to GitHub Pages (beta/)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          target-folder: beta
          clean: true
